{% extends "base.html" %}
{% block content %}

<h2>{{ view.object.pk|yesno:"Editar Categoria,Nova Categoria" }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="{% url 'financeiro:categoria_list' %}" class="btn btn-secondary">Voltar</a>
</form>

{% endblock %}
