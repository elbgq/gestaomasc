{% extends "base.html" %}
{% load widget_tweaks %}

{% block content %}

<h2 class="mb-4">Alterar Vencimento</h2>

<form method="post" novalidate>
    {% csrf_token %}

    <div class="card shadow-sm p-4">

        <div class="mb-3">
            <label class="form-label">Data de Vencimento</label>
            {{ form.data_vencimento|add_class:"form-control datepicker" }}
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success">💾 Salvar</button>
            <a href="{% url 'financeiro:contas_pagar_lista' %}" class="btn btn-secondary">↩️ Voltar</a>
        </div>

    </div>
</form>

{% endblock %}
