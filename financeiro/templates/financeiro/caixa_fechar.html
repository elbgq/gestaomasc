{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Fechamento do Caixa - {{ caixa.nome }}</h3>

    <p><strong>Saldo Atual:</strong> R$ {{ saldo_atual|floatformat:2 }}</p>

    <form method="post">
        {% csrf_token %}
        <label>Valor contado no caixa</label>
        <input type="number" step="0.01" name="valor_fechamento" class="form-control" required>

        <button class="btn btn-danger mt-3">Fechar Caixa</button>
    </form>
</div>
{% endblock %}
