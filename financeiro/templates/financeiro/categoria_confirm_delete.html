{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-3">Excluir Categoria</h2>

    <div class="card p-4 shadow-sm mb-3">
        <p>Tem certeza que deseja excluir a categoria <strong>{{ object.nome }}</strong>?</p>
    </div>

    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Excluir</button>
        <a href="{% url 'financeiro:categoria_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>

</div>
{% endblock %}
