{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Sangria - {{ caixa.nome }}</h3>

    <form method="post">
        {% csrf_token %}
        <label>Valor da Sangria</label>
        <input type="number" step="0.01" name="valor" class="form-control" required>

        <button class="btn btn-warning mt-3">Registrar Sangria</button>
    </form>
</div>
{% endblock %}
