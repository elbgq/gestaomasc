{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width: 650px;">

    <h2 class="mb-4">Parcelamento da Venda #{{ venda.id }}</h2>

    <div class="alert alert-info">
        <strong>Total da venda:</strong>
        R$ {{ venda.total|floatformat:2 }}
    </div>

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}

        <!-- Número de parcelas -->
        <div class="mb-3">
            <label for="id_parcelas" class="form-label">Número de parcelas</label>
            {{ form.parcelas }}
        </div>

        <!-- Dias entre parcelas -->
        <div class="mb-3">
            <label for="id_dias_entre_parcelas" class="form-label">Dias entre parcelas</label>
            {{ form.dias_entre_parcelas }}
        </div>

        <!-- Data inicial -->
        <div class="mb-3">
            <label for="id_data_inicial" class="form-label">Data inicial do pagamento</label>
            {{ form.data_inicial }}
        </div>

        <button class="btn btn-success btn-lg w-100 mt-3">
            Finalizar Venda
        </button>
    </form>

    <a href="{% url 'comercial:venda_editar' venda.id %}?continuar=1"
       class="btn btn-secondary mt-3">
        Voltar
    </a>

</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    // Inicializa o Flatpickr no campo de data
    flatpickr("#id_data_inicial", {
        dateFormat: "Y-m-d",
        locale: "pt",
        allowInput: true
    });

});
</script>
{% endblock scripts %}
